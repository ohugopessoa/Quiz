// ═══ v5.0 — SCORING RELATIVO ═══
function scoringRelativo(raiz, answers) {
  const sets = {
    familiar_financeira: ["P12","P19","P_NEW_FIN"],
    familiar_relacional: ["P16","P18","P_NEW_REL"],
    familiar_identidade: ["P14","P_NEW_ID"],
    preverbal: ["P25","P26","P27"],
    religiosa: ["P13","P15","P17"],
    sistemica: ["P20","P21","P22"],
    biografica: ["P23","P24","P33"],
  };
  const perguntas = sets[raiz] || [];
  const vals = perguntas.map(p => ({ id: p, val: answers[p] || 0 }));
  const media = vals.reduce((s,v) => s + v.val, 0) / (vals.length || 1);
  const max = Math.max(...vals.map(v => v.val));
  return vals.map(v => {
    const destaque = v.val === max && (max - media >= 0.5 || vals.filter(x => x.val === max).length <= 2);
    if (destaque && v.val >= 4) return { id: v.id, nivel: "alto", val: v.val };
    if (destaque || v.val >= media) return { id: v.id, nivel: "medio", val: v.val };
    return { id: v.id, nivel: "baixo", val: v.val };
  });
}

function gerarTransicaoRaizSup(raiz, sup) {
  const naturais = RAIZ_SUP_MAP[raiz] || [];
  if (naturais.includes(sup)) {
    const raiz_nome = NOMES_RAIZ[raiz];
    const sup_lower = (SUPERFICIES.find(s=>s.id===sup)?.label||sup).split("—")[0].trim().toLowerCase();
    return "Não é coincidência que a área que mais sofre seja " + sup_lower + ". A interferência de origem " + raiz_nome + " se expressa exatamente aí — porque é onde a identidade encontra a maior distância entre o que você quer e o que ela permite.";
  }
  const _raiz_nome = NOMES_RAIZ[raiz];
  const _sup_lower = (SUPERFICIES.find(s=>s.id===sup)?.label||sup).split("—")[0].trim().toLowerCase();
  return "Você disse que a área que mais sofre é " + _sup_lower + ". A interferência não atua NESSA área — ela atua ATRAVÉS dessa área. A raiz é " + _raiz_nome + ". E ela se expressa em " + _sup_lower + " porque é ali que a identidade encontra a maior distância entre o que você quer e o que ela aceita.";
}

function getPadraoSuperficie(padrao, sup, ocup) {
  const ocup_map = PADRAO_SUP_OCUP[ocup];
  if (ocup_map && ocup_map[padrao]) {
    if (ocup_map[padrao][sup]) return ocup_map[padrao][sup];
    if (ocup_map[padrao]._default) return ocup_map[padrao]._default;
  }
  return PADRAO_SUPERFICIE[padrao]?.[sup] || "";
}

function calcularScores(a) {
  const fam_fin=((a.P12||0)+(a.P19||0)+(a.P_NEW_FIN||0))/3,fam_id=((a.P14||0)+(a.P_NEW_ID||0))/2,fam_rel=((a.P16||0)+(a.P18||0)+(a.P_NEW_REL||0))/3,prev=((a.P25||0)+(a.P26||0)+(a.P27||0))/3,relig=((a.P13||0)+(a.P15||0)+(a.P17||0))/3,sist=((a.P20||0)+(a.P21||0)+(a.P22||0))/3,biog=(function(){
    const ev=a.P23_EVENTO||[];
    const concretos=ev.filter(v=>["falencia","divorcio","perda","diagnostico","violencia"].includes(v));
    let p23_equiv=0;
    if(concretos.length>=2)p23_equiv=5;
    else if(concretos.length===1)p23_equiv=4;
    else if(ev.includes("acumulo"))p23_equiv=2;
    else p23_equiv=0;
    return(p23_equiv+(a.P24||0)+(a.P33||0))/3;
  }());
  let scores={familiar_financeira:fam_fin,familiar_identidade:fam_id,familiar_relacional:fam_rel,preverbal:prev,religiosa:relig,sistemica:sist,biografica:biog};
  const b1=a.BIO1,b2=a.BIO2||[];
  if(b1==="B")scores.familiar_relacional+=0.5;if(b1==="C"){scores.biografica+=0.5;scores.preverbal+=0.3;}if(b1==="D"||b1==="E")scores.preverbal+=0.5;if(b1==="F")scores.preverbal+=0.7;
  if(b2.includes("A")){scores.preverbal+=0.4;scores.familiar_relacional+=0.3;}
  if(b2.includes("B")){scores.familiar_financeira+=0.5;scores.biografica+=0.1;}
  if(b2.includes("C")){scores.preverbal+=0.4;scores.familiar_relacional+=0.3;}
  // v7: D e E amplificam o líder atual em vez de empurrar biográfica
  if(b2.includes("D")){const _l=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];scores[_l]+=0.3;scores.biografica+=0.15;}
  if(b2.includes("E")){const _l=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];scores[_l]+=0.3;}
  if(a.P_SOMA==="E")scores.religiosa+=0.2;if(a.P_SOMA==="F")scores.preverbal+=0.2;
  // v7.1: Cruzamento Q_RELIGIAO × P13/P15/P17 — boost religioso inferido
  const _rel=a.Q_RELIGIAO||"";
  if(["evangelico","catolico"].includes(_rel)){
    if((a.P17||0)>=3)scores.religiosa+=0.4;
    if((a.P13||0)>=3)scores.religiosa+=0.3;
    if((a.P15||0)>=3)scores.religiosa+=0.3;
  }
  Object.keys(scores).forEach(k=>{if(typeof scores[k]==='number'&&scores[k]>5.5)scores[k]=5.5;});
  // FIX BUG #2: Desempate por correlação com superfície
  const sup_input = a.P10 || "";
  const SUP_RAIZ_CORR = {
    financeiro:["familiar_financeira","sistemica","religiosa"],
    relacional:["familiar_relacional","preverbal","biografica"],
    familiar:["familiar_relacional","familiar_financeira","familiar_identidade"],
    carreira:["familiar_identidade","sistemica","familiar_financeira"],
    saude:["preverbal","biografica","sistemica"],
    emocional:["preverbal","biografica","familiar_relacional"],
    espiritual:["religiosa","preverbal","familiar_identidade"],
  };
  const corr = SUP_RAIZ_CORR[sup_input] || [];
  const sorted=Object.entries(scores).sort((a,b)=>{
    if(b[1]!==a[1])return b[1]-a[1];
    const ai=corr.indexOf(a[0]),bi=corr.indexOf(b[0]);
    return (ai>=0?ai:99)-(bi>=0?bi:99);
  }),margem=sorted[0][1]-sorted[1][1];
  let raiz,raiz_sec=null,conf;if(margem>=0.8){raiz=sorted[0][0];conf="alta";}else if(margem>=0.4){raiz=sorted[0][0];raiz_sec=sorted[1][0];conf="media";}else{raiz=sorted[0][0];raiz_sec=sorted[1][0];conf="composta";}
  let esg=(a.P11||0);if(b2.includes("E"))esg+=0.5;const pad={repetidor:a.P28||0,sabotador:a.P29||0,esgotado:esg,comparador:a.P30||0,anestesiado:a.P31||0,paralisado:a.P32||0};if(a.P_SOMA==="D")pad.anestesiado+=0.3;
  const ps=Object.entries(pad).sort((a,b)=>b[1]-a[1]);let padrao=ps[0][0],pad_sec=ps[1][0];
  const p34m={A:"paralisado",B:"paralisado",C:"esgotado",D:"anestesiado",E:"esgotado",F:"repetidor",G:"sabotador"},p34p=p34m[a.P34];
  if(p34p&&p34p!==padrao&&Math.abs(pad[padrao]-pad[p34p])<=1)padrao=p34p;
  return{scores,raiz,raiz_secundaria:raiz_sec,confianca:conf,padroes:pad,padrao,padrao_secundario:pad_sec,padrao_score_sec:ps[1][1]};
}

        {/* ══════ S6 — CTA — v6.0: P_ASPIRACAO + P35 emotional close (fix P7) ══════ */}
        {SEC(null,<>
          {P("Ler o mapa não remove a interferência. Tudo que você leu opera na mente consciente — em estado beta, com o porteiro ativo.")}
          {P(getFechamento(sup, demo.ocup))}
          {/* v6.0: P_ASPIRACAO + P35 contrast (fix P7) */}
          {answers.P_ASPIRACAO && answers.P35 && answers.P_ASPIRACAO === answers.P35 && P(`Você disse que se nada te impedisse, iria ${ASPIRACAO_TEXTOS[answers.P_ASPIRACAO]}. E que se a interferência sumisse, ${P35_TEXTOS[answers.P35]}. A mesma resposta — porque a interferência É o que te impede. E no dia 27, ela vai ser confrontada.`, {fontWeight:600})}
          {answers.P_ASPIRACAO && answers.P35 && answers.P_ASPIRACAO !== answers.P35 && P(`Você disse que se nada te impedisse, iria ${ASPIRACAO_TEXTOS[answers.P_ASPIRACAO]}. Mas quando perguntei o que mudaria se a interferência sumisse, disse outra coisa: ${P35_TEXTOS[answers.P35]}. A diferença entre as duas respostas revela as camadas da interferência. No dia 27, as duas vão ser confrontadas.`, {fontWeight:600})}
          {answers.P_ASPIRACAO && !answers.P35 && P("Você disse que se nada te impedisse, iria " + ASPIRACAO_TEXTOS[answers.P_ASPIRACAO] + ". Esse \"nada\" tem nome. É a interferência. E no dia 27, ela vai ser confrontada.", {fontWeight:600})}
          <div style={{background:C.blueGlow,border:`1px solid ${C.blueBorder}`,borderRadius:16,padding:"36px 30px",marginTop:36,textAlign:"center"}}>
            <AscensaoHeader compact/>
            <div style={{height:16}}/>
            <h3 style={{fontSize:26,fontWeight:700,color:"#fff",marginBottom:14}}>27 de Abril · 20h · Ao Vivo</h3>
            <p style={{fontSize:18,lineHeight:1.7,color:C.textMid,marginBottom:26}}>Paulo Aguiar vai fazer o que nenhum texto consegue: acessar a camada onde a interferência opera — e iniciar a remoção.</p>
            <button style={{display:"inline-block",padding:"18px 52px",border:"none",borderRadius:40,background:`linear-gradient(135deg,${C.blue},${C.blueDark})`,color:"#fff",fontFamily:"'Outfit',sans-serif",fontSize:18,fontWeight:600,cursor:"pointer",transition:"all .3s"}} onMouseEnter={e=>{e.target.style.transform="translateY(-2px)";e.target.style.boxShadow="0 12px 32px rgba(77,166,255,0.4)";}} onMouseLeave={e=>{e.target.style.transform="none";e.target.style.boxShadow="none";}}>Ativar lembrete</button>
          </div>
          {answers.P31>=4&&<p style={{fontSize:15,lineHeight:1.7,color:C.textDim,marginTop:26,textAlign:"center"}}>Se precisa de ajuda profissional imediata, o CVV (188) está disponível 24h.</p>}
        </>)}
      </div>
    </div>
  );
}
